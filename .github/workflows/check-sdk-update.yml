name: Check SDK Update

on:
  schedule:
    - cron: '0 9 * * 1' # Žß§ž£ľ žõĒžöĒžĚľ 09:00 UTC
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for SDK update
        id: check
        continue-on-error: true
        run: pnpm run check-sdk-update

      # žÉą export ÍįźžßÄ ‚ÄĒ žēĄžßĀ žóÖÍ∑łŽ†ąžĚīŽďúŪēėÍłį ž†Ą(installed = ŪėĄžě¨ ŪēÄ)žóź žč§ŪĖČŪēīžēľ
      # installed vs latest diffÍįÄ ŽßěŽäĒŽč§. žÉą exportŽäĒ type errorŽ•ľ ŽßĆŽď§žßÄ žēäžēĄžĄú
      # typecheckŽßĆžúľŽ°† ŽÜďžĻėŽäĒ žā¨Í≥†Ž•ľ žĚī stepžĚī ŽßČŽäĒŽč§.
      - name: Diff SDK exports (installed vs latest)
        if: steps.check.outcome == 'failure'
        id: exports
        continue-on-error: true
        run: pnpm run diff-sdk-exports

      - name: Update SDK and typecheck
        if: steps.check.outcome == 'failure'
        id: typecheck
        continue-on-error: true
        run: |
          pnpm add @apps-in-toss/web-framework@latest
          pnpm run typecheck 2>&1 | tee typecheck-output.txt

      - name: Create issue if update available
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let typecheckOutput = '';
            try {
              typecheckOutput = fs.readFileSync('typecheck-output.txt', 'utf8');
            } catch {}

            const newExports = `${{ steps.exports.outputs.new_exports }}`.trim();
            const removedExports = `${{ steps.exports.outputs.removed_exports }}`.trim();
            const newList = newExports ? newExports.split('\n').filter(Boolean) : [];
            const removedList = removedExports ? removedExports.split('\n').filter(Boolean) : [];

            const hasTypeErrors = typecheckOutput.includes('error TS');
            const hasNewExports = newList.length > 0;

            // mock ž∂ĒÍįÄ ŪēĄžöĒ = žÉą exportÍįÄ žěąÍĪįŽāė(typecheckŽ°ú žēą žě°Ūěė) type errorÍįÄ žěąÍĪįŽāė.
            const needsWork = hasNewExports || hasTypeErrors;

            const title = `SDK Update Available: @apps-in-toss/web-framework`;
            const sections = [
              `A new version of \`@apps-in-toss/web-framework\` is available.`,
              needsWork
                ? '**Action needed** ‚ÄĒ new exports and/or type changes require mock updates.'
                : 'No new exports and no type errors ‚ÄĒ update should be straightforward.',
            ];
            if (hasNewExports) {
              sections.push(
                `### New exports (${newList.length}) ‚ÄĒ need mock + demo\n` +
                  newList.map((n) => `- \`${n}\``).join('\n'),
              );
            }
            if (removedList.length > 0) {
              sections.push(
                `### Removed exports (${removedList.length}) ‚ÄĒ clean up mock\n` +
                  removedList.map((n) => `- \`${n}\``).join('\n'),
              );
            }
            if (hasTypeErrors) {
              sections.push('### Type errors\n```\n' + typecheckOutput.slice(0, 3000) + '\n```');
            }
            sections.push(
              [
                '### Action Required',
                '1. `pnpm add @apps-in-toss/web-framework@latest`',
                '2. `pnpm run typecheck` ‚ÄĒ fix any type errors',
                hasNewExports
                  ? '3. Mock the new exports (see `src/mock/`), add `__typecheck.ts` coverage + tests'
                  : '3. Check for new exports that need mock implementations',
                '4. `pnpm run diff-sdk-exports` locally to re-verify the export set is fully covered',
              ].join('\n'),
            );
            const body = sections.join('\n\n');

            // sdk-update ŽĚľŽ≤®žĚī žóÜžúľŽ©ī ŽßĆŽď†Žč§ (žóÜžúľŽ©ī createÍįÄ ŽĚľŽ≤® ŽąĄŽĚĹžúľŽ°ú žč§ŪĆ®).
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'sdk-update',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'sdk-update',
                color: 'd4c5f9',
                description: 'New @apps-in-toss/web-framework version available',
              });
            }

            // Check if issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sdk-update',
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sdk-update'],
              });
            }
