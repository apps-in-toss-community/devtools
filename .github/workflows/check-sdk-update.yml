name: Check SDK Update

on:
  schedule:
    - cron: '0 9 * * 1' # 매주 월요일 09:00 UTC
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for SDK update
        id: check
        continue-on-error: true
        run: pnpm run check-sdk-update

      # 새 export 감지 — 아직 업그레이드하기 전(installed = 현재 핀)에 실행해야
      # installed vs latest diff가 맞는다. 새 export는 type error를 만들지 않아서
      # typecheck만으론 놓치는 사고를 이 step이 막는다.
      - name: Diff SDK exports (installed vs latest)
        if: steps.check.outcome == 'failure'
        id: exports
        continue-on-error: true
        run: pnpm run diff-sdk-exports

      - name: Update SDK and typecheck
        if: steps.check.outcome == 'failure'
        id: typecheck
        continue-on-error: true
        run: |
          pnpm add @apps-in-toss/web-framework@latest
          pnpm run typecheck 2>&1 | tee typecheck-output.txt

      - name: Create issue if update available
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v9
        env:
          NEW_EXPORTS: ${{ steps.exports.outputs.new_exports }}
          REMOVED_EXPORTS: ${{ steps.exports.outputs.removed_exports }}
        with:
          script: |
            try {
            const fs = require('fs');
            let typecheckOutput = '';
            try {
              typecheckOutput = fs.readFileSync('typecheck-output.txt', 'utf8');
            } catch {}

            const newExports = (process.env.NEW_EXPORTS || '').trim();
            const removedExports = (process.env.REMOVED_EXPORTS || '').trim();
            const newList = newExports ? newExports.split('\n').filter(Boolean) : [];
            const removedList = removedExports ? removedExports.split('\n').filter(Boolean) : [];

            const hasTypeErrors = typecheckOutput.includes('error TS');
            const hasNewExports = newList.length > 0;

            // mock 추가 필요 = 새 export가 있거나(typecheck로 안 잡힘) type error가 있거나.
            const needsWork = hasNewExports || hasTypeErrors;

            const title = `SDK Update Available: @apps-in-toss/web-framework`;
            const sections = [
              `A new version of \`@apps-in-toss/web-framework\` is available.`,
              needsWork
                ? '**Action needed** — new exports and/or type changes require mock updates.'
                : 'No new exports and no type errors — update should be straightforward.',
            ];
            if (hasNewExports) {
              sections.push(
                `### New exports (${newList.length}) — need mock + demo\n` +
                  newList.map((n) => `- \`${n}\``).join('\n'),
              );
            }
            if (removedList.length > 0) {
              sections.push(
                `### Removed exports (${removedList.length}) — clean up mock\n` +
                  removedList.map((n) => `- \`${n}\``).join('\n'),
              );
            }
            if (hasTypeErrors) {
              sections.push('### Type errors\n```\n' + typecheckOutput.slice(0, 3000) + '\n```');
            }
            sections.push(
              [
                '### Action Required',
                '1. `pnpm add @apps-in-toss/web-framework@latest`',
                '2. `pnpm run typecheck` — fix any type errors',
                hasNewExports
                  ? '3. Mock the new exports (see `src/mock/`), add `__typecheck.ts` coverage + tests'
                  : '3. Check for new exports that need mock implementations',
                '4. `pnpm run diff-sdk-exports` locally to re-verify the export set is fully covered',
              ].join('\n'),
            );
            const body = sections.join('\n\n');

            // sdk-update 라벨이 없으면 만든다 (없으면 create가 라벨 누락으로 실패).
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'sdk-update',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'sdk-update',
                color: 'd4c5f9',
                description: 'New @apps-in-toss/web-framework version available',
              });
            }

            // Check if issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sdk-update',
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sdk-update'],
              });
            }
            } catch (e) {
              core.setFailed('Create issue step 실패: ' + (e instanceof Error ? e.message : String(e)));
            }
