name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      # Install-graph invariant: react/react-dom are devDeps only; the MCP
      # daemon bundles must never import them (see scripts/check-mcp-react-free.sh).
      - run: pnpm check:mcp-react-free

      # Build-artifact presence guard: dist/test-runner/runtime.js must exist
      # after build so bundleTestFile can resolve it at runtime (#676).
      - run: pnpm check:test-runner-dist

      # Build-time absence invariant (#647): the in-app debug surface (Chii
      # injection + eruda console) must DCE to 0 bytes in a release consumer
      # build and never leak into the MCP daemon bundles. Builds the fixture in
      # release + debug modes and greps (see scripts/check-debug-surface-absent.sh).
      - run: pnpm check:debug-surface-absent

      # The dashboard/attach HTML is precompiled from scripts/dashboard/*.tsx to
      # src/mcp/dashboard.generated.ts at build time. This guard fails if a JSX
      # template was edited without regenerating the committed string module.
      - run: pnpm check:dashboard-html-fresh

      # Alias-presence guard: the dual-line typecheck verifies the mock against
      # both 3.0-beta (bare devDep) and the 2.x stable line (web-framework-2x
      # alias). If the alias silently disappears or drifts off the expected
      # version, tsconfig.2x.json would skip silently — fail fast instead of
      # green-lying. The alias is pinned to 2.10.0 exact (NOT 2.10.x): 2.10.1
      # has the upstream CodegenTypes type regression (web-bridge imports an
      # unbuilt raw .ts subpath from native-modules), so the guard must reject
      # any drift off 2.10.0 — including 2.10.1. Bump this expected version in
      # lockstep whenever the alias is advanced.
      - run: 'node -e "const p=require(''@apps-in-toss/web-framework-2x/package.json''); if(!/^2\.10\.0/.test(p.version)){console.error(''2x alias not 2.10.0: ''+p.version);process.exit(1)}"'

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm qa:fidelity --runner=mock

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache Playwright browsers keyed on the resolved @playwright/test version
      # so version bumps invalidate the cache automatically.
      - id: playwright-version
        run: |
          version=$(node -e 'const j=JSON.parse(require("child_process").execSync("pnpm list @playwright/test --depth=0 --json").toString());console.log(j[0].devDependencies["@playwright/test"].version)')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # webServer in playwright.config.ts builds devtools (`pnpm build`) and
      # the e2e/fixture/ Vite app, then serves the preview on :4173.
      - run: pnpm test:e2e

      - if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore
