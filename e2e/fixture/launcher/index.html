<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <!--
      black-translucent (#484): the standalone web view extends UNDER the status
      bar (top-anchored, edge-to-edge) instead of starting below it. This is the
      "game-type" Toss representation — the page owns the top inset and paints
      its own dark background behind the (now translucent) status bar, killing
      the white band + dead ~54px strip observed in env-2 (#484 mechanism). The
      framed dev app then receives the real top inset (0) forwarded by the
      launcher (see Launcher.tsx postMessage), so it no longer double-pads.

      Trade-off vs #469: black-translucent makes a HEALTHY standalone window
      report env(safe-area-inset-top) > 0 (the status-bar height), which the
      old letterbox heuristic used as its discriminator. letterbox.ts was
      redesigned for this geometry (#484) — healthy black-translucent is now
      distinguished from a letterbox by reaching the screen bottom (no
      shortfall), not by a zero top inset.

      iOS web clips snapshot meta tags at install time — changes here only take
      effect after removing and re-adding the home-screen app.
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0d10" />
    <link rel="manifest" href="/launcher/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/launcher/icon-192.png" />
    <title>AITC DevTools Launcher</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #0b0d10; color: #e8eaed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      button { padding: 10px 14px; font-size: 14px; font-weight: 600; border-radius: 8px; border: 0; background: #3b6fff; color: #fff; cursor: pointer; }
      button.secondary { background: #2a2e33; color: #e8eaed; }
      #install-cta { padding: 10px 18px; font-size: 14px; font-weight: 600; border-radius: 8px; border: 0; background: #3b6fff; color: #fff; cursor: pointer; }
      #install-cta:hover { filter: brightness(1.1); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
