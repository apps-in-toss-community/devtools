<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0d10" />
    <link rel="manifest" href="/launcher/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/launcher/icon-192.png" />
    <title>AITC DevTools Launcher</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #0b0d10; color: #e8eaed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      #setup {
        min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
      }
      #setup h1 { font-size: 18px; font-weight: 600; margin: 0; }
      #setup p { font-size: 13px; color: #9aa0a6; margin: 0; max-width: 30rem; text-align: center; line-height: 1.5; }
      #setup-tools { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
      #scanner { width: min(80vw, 320px); aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: #16191d; display: none; }
      #scanner video { width: 100%; height: 100%; object-fit: cover; }
      .row { display: flex; gap: 8px; width: min(92vw, 420px); }
      input[type="url"] { flex: 1; min-width: 0; padding: 10px 12px; font-size: 15px; border-radius: 8px; border: 1px solid #2a2e33; background: #16191d; color: #e8eaed; }
      button { padding: 10px 14px; font-size: 14px; font-weight: 600; border-radius: 8px; border: 0; background: #3b6fff; color: #fff; cursor: pointer; }
      button.secondary { background: #2a2e33; color: #e8eaed; }
      #msg { font-size: 12px; color: #f28b82; min-height: 16px; text-align: center; }
      #install-cta {
        padding: 10px 18px; font-size: 14px; font-weight: 600; border-radius: 8px;
        border: 0; background: #3b6fff; color: #fff; cursor: pointer;
      }
      #install-cta:hover { filter: brightness(1.1); }
      /* Live view: launcher becomes a chromeless shell around the dev app. */
      #frame { position: fixed; inset: 0; border: 0; width: 100%; height: 100dvh; background: #fff; display: none; }
      #rescan {
        position: fixed; right: max(12px, env(safe-area-inset-right)); bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 10; padding: 8px 12px; font-size: 12px; border-radius: 999px; background: rgba(20,22,26,.85);
        color: #e8eaed; border: 1px solid #2a2e33; display: none; backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body>
    <main id="setup" data-testid="launcher-setup">
      <h1>AITC DevTools Launcher</h1>
      <p>
        Point your camera at the QR shown in your dev server's terminal, or paste the
        <code>https://…trycloudflare.com</code> URL below. The dev app then opens full-screen
        inside this launcher.
      </p>
      <button type="button" id="install-cta" data-testid="launcher-install-cta">
        Install launcher to your phone
      </button>
      <pwa-install
        id="pwa-install"
        data-testid="launcher-install-prompt"
        manifest-url="/launcher/manifest.webmanifest"
        name="AITC DevTools Launcher"
        description="Open an Apps In Toss dev server tunnel full-screen on a real phone."
        disable-install-description="true"
        manual-chrome="true"
      ></pwa-install>
      <button
        type="button"
        id="open-once"
        class="secondary"
        data-testid="launcher-open-once"
        style="display: none"
      >
        Open this once without installing
      </button>
      <div id="setup-tools" data-testid="launcher-setup-tools">
        <div id="scanner" data-testid="launcher-scanner">
          <video playsinline>
            <track kind="captions" />
          </video>
        </div>
        <div class="row">
          <input
            type="url"
            id="url-input"
            data-testid="launcher-url-input"
            placeholder="https://example.trycloudflare.com"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <button type="button" id="open-btn" data-testid="launcher-open-btn">Open</button>
        </div>
        <button type="button" id="scan-btn" class="secondary" data-testid="launcher-scan-btn">
          Scan QR with camera
        </button>
        <div id="msg" data-testid="launcher-msg"></div>
      </div>
    </main>
    <iframe
      id="frame"
      title="Dev app preview"
      data-testid="launcher-frame"
      allow="camera; microphone; geolocation; clipboard-read; clipboard-write"
      referrerpolicy="no-referrer"
    ></iframe>
    <button type="button" id="rescan" data-testid="launcher-rescan-btn">Rescan</button>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
