<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <!--
      Standalone display is declared ONLY by the web app manifest
      (display: standalone) + viewport-fit=cover above. The legacy
      *-web-app-capable / apple-mobile-web-app-status-bar-style=black-translucent
      metas were removed in #469: manifest display:standalone has been sufficient
      on iOS since 11.3, and the legacy/manifest coexistence is the suspected
      trigger of the iOS 26 standalone letterbox (web view mis-sized by the
      status-bar height, bottom strip painted with manifest background_color).
      iOS web clips snapshot meta tags at install time — changes here only take
      effect after removing and re-adding the home-screen app.
    -->
    <meta name="theme-color" content="#0b0d10" />
    <link rel="manifest" href="/launcher/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/launcher/icon-192.png" />
    <title>AITC DevTools Launcher</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #0b0d10; color: #e8eaed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      button { padding: 10px 14px; font-size: 14px; font-weight: 600; border-radius: 8px; border: 0; background: #3b6fff; color: #fff; cursor: pointer; }
      button.secondary { background: #2a2e33; color: #e8eaed; }
      #install-cta { padding: 10px 18px; font-size: 14px; font-weight: 600; border-radius: 8px; border: 0; background: #3b6fff; color: #fff; cursor: pointer; }
      #install-cta:hover { filter: brightness(1.1); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
